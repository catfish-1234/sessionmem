name: Release

# Tag-triggered npm publish (QLTY-05 / D-15).
# Prefer npm trusted publishing via GitHub OIDC (no stored long-lived token,
# automatic Sigstore provenance). A documented NPM_TOKEN fallback is provided
# below for the case where the one-time npmjs.com trusted-publisher UI setup
# (Package -> Settings -> Trusted Publisher) has not been completed.
on:
  push:
    tags:
      - "v*"

# Least-privilege at the workflow level (V4 access control / T-08-13):
# do NOT grant id-token here. id-token: write is scoped to the publish job only
# so a compromised step in any other (future) job cannot mint an OIDC token.
permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # REQUIRED for OIDC trusted publishing + automatic provenance (scoped to this job only)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run build

      - run: npm test

      # OIDC trusted publishing is auto-detected when id-token: write is present;
      # provenance is emitted automatically, so no --provenance flag is needed.
      - name: Publish to npm
        run: npm publish --access public
        # ---------------------------------------------------------------------
        # NPM_TOKEN FALLBACK (D-18): use this ONLY if the npmjs.com trusted
        # publisher (OIDC) UI setup is not configured for kavishdua/sessionmem.
        # Uncomment the env block below, add an NPM_TOKEN secret in GitHub
        # Actions secrets (Settings -> Secrets and variables -> Actions), and
        # optionally append `--provenance` to the publish command above.
        # NEVER commit a token value; the secret lives in GitHub Actions only.
        #
        # env:
        #   NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # ---------------------------------------------------------------------
